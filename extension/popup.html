<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="title">Okhra</span>
    <div class="controls">
      <select id="fpr-select">
        <option value="0.001">FPR=0.1%</option>
        <option value="0.005">FPR=0.5%</option>
        <option value="0.01" selected>FPR=1%</option>
      </select>
      <button id="theme-toggle">◑</button>
    </div>
  </div>

  <textarea id="text-input" rows="5"
            placeholder="Paste text here… (Ctrl+Enter to analyze)"></textarea>
  <button id="analyze-btn" disabled>Check</button>

  <div id="status" class="status">please wait...</div>

  <div id="results" class="hidden">
    <div id="verdict"></div>
    <div id="prob-bar-wrap"><div id="prob-bar"></div></div>
    <div id="prob-label"></div>
    <div id="chunk-viz"></div>
  </div>

  <script src="lib/ort.min.js"></script>
  <script src="tokenizer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
